name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [master]  

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 15+ (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get install -y gcc-15 g++-15 make
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 60
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 60
          gcc --version

      - name: Install GCC 15+ (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc@15 make
          sudo ln -sf $(brew --prefix gcc@15)/bin/gcc-15 /usr/local/bin/gcc
          sudo ln -sf $(brew --prefix gcc@15)/bin/g++-15 /usr/local/bin/g++
          gcc --version

      - name: Install GCC 15+ (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install msys2 --params="/InstallDir:C:\tools\msys64 /NoPath"
          refreshenv
          C:\tools\msys64\usr\bin\bash.exe -l -c "pacman -Syu --noconfirm"
          C:\tools\msys64\usr\bin\bash.exe -l -c "pacman -S --noconfirm mingw-w64-ucrt-x86_64-gcc make"
          echo "C:\tools\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          gcc --version

      - name: Build & test
        run: |
          make test
        shell: bash
